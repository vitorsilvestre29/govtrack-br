services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=govtrack
      - POSTGRES_PASSWORD=govtrack123
      - POSTGRES_DB=govtrack
    ports:
      - "5432:5432"
    networks:
      - govtrack-network

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - govtrack-network

  postgres-airflow:
    image: postgres:15
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow123
      - POSTGRES_DB=airflow
    ports:
      - "5433:5432"
    networks:
      - govtrack-network

  airflow-webserver:
    image: apache/airflow:2.5.1
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow123@postgres-airflow:5432/airflow
      - DATA_PATH=/opt/airflow/data
    ports:
      - "8081:8080"
    depends_on:
      - postgres-airflow
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    networks:
      - govtrack-network

  airflow-scheduler:
    image: apache/airflow:2.5.1
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow123@postgres-airflow:5432/airflow
      - DATA_PATH=/opt/airflow/data
    depends_on:
      - postgres-airflow
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    networks:
      - govtrack-network

  superset:
    image: apache/superset
    ports:
      - "8088:8088"
    depends_on:
      - postgres
    environment:
      - SUPERSET_SECRET_KEY=govtrack_secret_key
    networks:
      - govtrack-network

networks:
  govtrack-network:
    driver: bridge