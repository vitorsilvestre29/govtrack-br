name: dbt test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: govtrack
          POSTGRES_PASSWORD: govtrack123
          POSTGRES_DB: govtrack
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install dbt-core==1.8.0 dbt-postgres==1.8.0

      - name: Run dbt seed
        run: |
          cd govtrack_dbt
          dbt seed
        env:
          DBT_PROFILES_DIR: .

      - name: Run dbt
        run: |
          cd govtrack_dbt
          dbt run
          dbt test
        env:
          DBT_PROFILES_DIR: .